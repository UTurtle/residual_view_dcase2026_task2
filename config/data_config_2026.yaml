# Edit these paths to match your local DCASE2026 Task 2 directory.
# Expected split layout per machine:
#   <machine>/train/*.wav
#   <machine>/test/*.wav
#
# Development split is used for development-set score checks.
# Evaluation split is used for final eval score generation.

dcase2026_train_dirs:
  - data/dcase2026_task2/dev/ToyCar/train
  - data/dcase2026_task2/dev/ToyCarEmu/train
  - data/dcase2026_task2/dev/bearingEmu/train
  - data/dcase2026_task2/dev/fan/train
  - data/dcase2026_task2/dev/gearboxEmu/train
  - data/dcase2026_task2/dev/sliderEmu/train
  - data/dcase2026_task2/dev/valveEmu/train

