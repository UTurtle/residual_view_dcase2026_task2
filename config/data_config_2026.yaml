  - data/dcase2026_task2/dev/ToyCarEmu/test
  - data/dcase2026_task2/dev/bearingEmu/test
  - data/dcase2026_task2/dev/fan/test
  - data/dcase2026_task2/dev/gearboxEmu/test
  - data/dcase2026_task2/dev/sliderEmu/test
  - data/dcase2026_task2/dev/valveEmu/test

dcase2026_eval_train_dirs:
